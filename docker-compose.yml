services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: triplan_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma db push && npm run dev"
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - /app/node_modules
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/triplan_dev"
      ACCESS_TOKEN_SECRET: "dev-access-secret-change-in-production"
      REFRESH_TOKEN_SECRET: "dev-refresh-secret-change-in-production"
      PORT: 3001
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    depends_on:
      - server

volumes:
  pg_data_dev:
