name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server deps
        run: cd server && npm ci

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: TypeScript check (server)
        run: cd server && npx tsc --noEmit

      - name: Install client deps
        run: cd client && npm ci

      - name: TypeScript check (client)
        run: cd client && npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: triplan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server deps
        run: cd server && npm ci

      - name: Generate Prisma client
        run: cd server && npx prisma generate

      - name: Setup test database
        run: cd server && npx prisma db push
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/triplan_test"

      - name: Run tests
        run: cd server && npm test
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/triplan_test"
          ACCESS_TOKEN_SECRET: "test-access-secret"
          REFRESH_TOKEN_SECRET: "test-refresh-secret"
          NODE_ENV: test

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: triplan_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tri-planner:${{ github.sha }} .

      - name: Test Docker image starts
        run: |
          docker run -d --name tri-planner-test \
            --network host \
            -e DATABASE_URL="postgresql://postgres:postgres@localhost:5432/triplan_test" \
            -e ACCESS_TOKEN_SECRET="test-secret" \
            -e REFRESH_TOKEN_SECRET="test-refresh-secret" \
            -e NODE_ENV=production \
            tri-planner:${{ github.sha }}
          sleep 15
          curl --fail http://localhost:3001/api/health || (docker logs tri-planner-test && exit 1)
          docker stop tri-planner-test
